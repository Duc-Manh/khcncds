<!doctype html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đăng nhập - Hệ thống Sáng kiến EVNGENCO2</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/login.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Montserrat', 'sans-serif'] },
          colors: {
            evnRed: '#DB0D0D',
            evnBlue: '#29348f',
          },
        },
      },
    };
  </script>
</head>

<body
  class="bg-slate-50 flex items-center justify-center min-h-screen bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-blue-50 via-slate-50 to-white">
  <main id="auth-container" class="relative z-10 w-full max-w-[450px] mx-4 transition-all duration-500">
    <div class="bg-white p-8 rounded-[2rem] border border-evnBlue">
      <div class="text-center mb-10">
        <img src="/images/logo_evngenco2.png" alt="Logo EVNGENCO2" class="h-16 mx-auto mb-4 object-contain" />
        <h1 id="auth-title" class="text-2xl font-extrabold text-evnBlue tracking-tight uppercase">
          Đăng nhập hệ thống
        </h1>
        <div class="h-1 w-12 bg-evnRed mx-auto mt-2 rounded-full"></div>
      </div>

      <form id="login-form" action="/login" method="POST" class="space-y-4 block transition-all duration-500">
        <!-- Thông báo lỗi -->
        <div th:if="${error}"
          class="bg-red-50 text-evnRed text-sm font-bold p-3 rounded-2xl border border-red-200 text-center flex items-center justify-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <span th:text="${error}"></span>
        </div>
        <div class="relative group">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 group-focus-within:text-evnBlue transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
            </svg>
          </span>
          <input type="text" name="username" placeholder="Tên đăng nhập"
            class="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-evnBlue rounded-2xl focus:ring-4 focus:ring-evnBlue/5 focus:border-evnBlue outline-none transition-all text-base font-medium"
            required />
        </div>

        <div class="relative group">
          <span
            class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 group-focus-within:text-evnBlue transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
            </svg>
          </span>
          <input type="password" name="password" placeholder="Mật khẩu"
            class="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-evnBlue rounded-2xl focus:ring-4 focus:ring-evnBlue/5 focus:border-evnBlue outline-none transition-all text-base font-medium"
            required />
        </div>

        <div class="flex items-center gap-3">
          <div class="relative group flex-1">
            <span
              class="absolute inset-y-0 left-0 flex items-center pl-3.5 text-gray-400 group-focus-within:text-evnBlue transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
            </span>
            <input type="text" name="captcha" placeholder="Mã xác thực"
              class="w-full pl-11 pr-4 py-3 bg-gray-50/50 border border-evnBlue rounded-2xl focus:ring-4 focus:ring-evnBlue/5 focus:border-evnBlue outline-none transition-all text-base font-medium uppercase"
              required />
          </div>
          <div onclick="generateCaptcha()"
            class="w-32 h-[50px] rounded-2xl border border-evnBlue cursor-pointer group overflow-hidden"
            title="Nhấn để đổi mã">
            <img id="captcha-image" src="/captcha" alt="Mã xác thực"
              class="w-full h-full object-cover group-hover:opacity-80 transition-opacity duration-200" />
          </div>
        </div>

        <div class="flex justify-end pr-1">
          <a href="#" class="text-sm font-bold text-evnBlue hover:text-evnRed transition-colors">Quên mật khẩu?</a>
        </div>

        <button type="submit"
          class="w-full bg-evnBlue text-white font-bold py-3.5 rounded-2xl text-xl shadow-xl shadow-blue-900/20 hover:bg-blue-800 transform active:scale-[0.97] transition-all">
          ĐĂNG NHẬP
        </button>

        <div class="mt-8 pt-6 border-t border-gray-50 text-center space-y-4">
          <p class="text-sm text-evnBlue font-medium">
            Chưa có tài khoản?
            <button type="button" onclick="switchToRegister()"
              class="text-evnRed text-sm font-extrabold hover:underline underline-offset-4 ml-1">
              Đăng ký
            </button>
          </p>

          <a href="/"
            class="text-sm text-gray-400 hover:text-evnBlue font-bold uppercase tracking-tighter flex items-center justify-center gap-1 transition-all duration-300">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Quay lại trang chủ
          </a>
        </div>
      </form>

      <div id="register-form" class="hidden animate-in fade-in slide-in-from-bottom-4 duration-500">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4 h-auto min-h-[360px] items-stretch">
          <div
            class="p-4 rounded-2xl border border-evnBlue bg-evnBlue flex flex-col justify-start items-start transition-all duration-500">
            <h4 class="font-bold text-white text-sm mb-3 flex items-center gap-2">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              Hướng dẫn
            </h4>
            <ul class="text-sm text-white space-y-3 leading-snug">
              <li class="flex gap-2"><span>1.</span> Chọn đơn vị công tác</li>
              <li class="flex gap-2"><span>2.</span> Chọn mục đích đăng ký.</li>
              <li class="flex gap-2"><span>3.</span> Nhấn nút GỬI ĐĂNG KÝ.</li>
            </ul>
          </div>

          <form th:action="@{/register}" method="post" class="md:col-span-2 grid grid-cols-1 md:grid-cols-2 gap-6 py-1">
            <div class="space-y-4">
              <div class="space-y-2">
                <label class="block text-sm font-bold text-evnBlue uppercase mb-1 ml-1">Đơn vị công tác</label>
                <select name="department"
                  class="w-full px-3 py-2.5 bg-gray-50 border border-evnBlue rounded-xl outline-none focus:border-evnBlue text-sm font-semibold appearance-none cursor-pointer">
                  <option class="text-evnBlue">--- Chọn đơn vị ---</option>
                  <option>Cơ quan Tổng Công ty Phát điện 2</option>
                  <option>Công ty Nhiệt điện Cần Thơ</option>
                  <option>Công ty Thủy điện An Khê - Ka Nak</option>
                  <option>Công ty Thủy điện Quảng Trị</option>
                  <option>Công ty Thủy điện Sông Bung</option>
                  <option>Công ty Thủy điện Trung Sơn</option>
                  <option>Công ty CP Thủy điện Thác Mơ</option>
                  <option>Công ty CP Thủy điện A Vương</option>
                  <option>Công ty CP Thủy điện Sông Ba Hạ</option>
                  <option>Công ty CP Nhiệt điện Phả Lại</option>
                  <option>Công ty CP Nhiệt điện Hải Phòng</option>
                </select>
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-bold text-evnBlue uppercase mb-1 ml-1">Vị trí công tác</label>
                <select name="position"
                  class="w-full px-3 py-2.5 bg-gray-50 border border-evnBlue rounded-xl outline-none focus:border-evnBlue text-sm font-semibold appearance-none cursor-pointer">
                  <option class="text-evnBlue">--- Chọn vị trí ---</option>
                  <option>Tổng Giám Đốc</option>
                  <option>Q.Tổng Giám Đốc</option>
                  <option>Phó Tổng Giám Đốc</option>
                  <option>Giám Đốc</option>
                  <option>Q.Giám Đốc</option>
                  <option>Phó Giám Đốc</option>
                  <option>Trưởng phòng</option>
                  <option>Q.Trưởng phòng</option>
                  <option>Phó phòng</option>
                  <option>Chuyên viên</option>
                  <option>Kỹ thuật viên</option>
                  <option>Cán sự</option>
                  <option>Trưởng ca</option>
                  <option>Trực ĐKTT</option>
                  <option>Trực gian máy</option>
                  <option>Trực chính</option>
                  <option>Trực phụ</option>
                  <option>Sửa chữa</option>
                </select>
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-bold text-evnBlue uppercase mb-1 ml-1">Họ và tên</label>
                <input type="text" name="fullName" placeholder="Nhập họ và tên..."
                  class="w-full px-3 py-2.5 bg-gray-50 border border-evnBlue rounded-xl outline-none focus:border-evnBlue text-sm font-semibold" />
              </div>


            </div>

            <div class="space-y-4">
              <div class="space-y-2">
                <label class="block text-sm font-bold text-evnBlue uppercase mb-1 ml-1">Mục đích đăng ký</label>
                <select name="aim"
                  class="w-full px-3 py-2.5 bg-gray-50 border border-evnBlue rounded-xl outline-none focus:border-evnBlue text-sm font-semibold appearance-none cursor-pointer">
                  <option class="text-evnBlue">--- Chọn mục đích ---</option>
                  <option>Đăng ký sáng kiến</option>
                  <option>Đăng ký xét duyệt</option>
                  <option>Đăng ký nội bộ</option>
                </select>
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-bold text-evnBlue uppercase mb-1 ml-1">Email</label>
                <input type="email" name="email" placeholder="Nhập địa chỉ email..."
                  class="w-full px-3 py-2.5 bg-gray-50 border border-evnBlue rounded-xl outline-none focus:border-evnBlue text-sm font-semibold" />
              </div>

              <div class="space-y-2">
                <label class="block text-sm font-bold text-evnBlue uppercase mb-1 ml-1">Số điện thoại</label>
                <input type="text" name="phone" placeholder="Nhập số điện thoại..."
                  class="w-full px-3 py-2.5 bg-gray-50 border border-evnBlue rounded-xl outline-none focus:border-evnBlue text-sm font-semibold" />
              </div>
              <div class="space-y-2">
                <label class="block text-sm font-bold opacity-0 mb-1 ml-1 select-none pointer-events-none"
                  aria-hidden="true">_</label>
                <button type="submit"
                  class="w-full bg-evnRed text-white font-bold py-3 mb-4 rounded-xl shadow-lg shadow-red-100 hover:bg-white hover:text-evnRed hover:border hover:border-evnRed transition-all text-sm uppercase tracking-wider">
                  GỬI ĐĂNG KÝ
                </button>

                <button type="button" onclick="switchToLogin()"
                  class="w-full text-sm text-gray-400 hover:text-evnBlue font-bold uppercase tracking-tighter flex items-center justify-center gap-1 transition-all duration-300">
                  <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                  </svg>
                  Quay lại đăng nhập
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </main>
  <div class="fixed bottom-2 right-2 z-0">
    <img src="/images/motif.png" alt="Digital Transformation" class="h-52 w-auto object-contain" />
  </div>
  <script src="/js/login.js"></script>
  <!-- Registration Success Popup -->
  <div th:if="${param.registered != null}" id="register-success-popup"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-6 w-[400px] shadow-2xl transform transition-all text-center">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
        <svg class="w-8 h-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
      <h3 class="text-xl font-bold text-gray-900 mb-2">Thông báo</h3>
      <p class="text-sm text-gray-600 mb-6">Đã gửi đăng ký tài khoản thành công, bạn chờ email thông báo nhé.</p>
      <button onclick="document.getElementById('register-success-popup').style.display='none'"
        class="w-full py-2.5 bg-green-500 hover:bg-green-600 text-white rounded-xl font-semibold transition-colors shadow-sm">
        Đóng
      </button>
    </div>
  </div>

</body>

</html>
