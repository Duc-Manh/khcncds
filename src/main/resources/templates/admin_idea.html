<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin-Ban KHCNCDS</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    colors: {
                        evnRed: '#DB0D0D',
                        evnBlue: '#29348f',
                        primary: '#29348f',
                        activeBg: '#eef2ff',
                        activeText: '#29348f',
                        bgMain: '#f8fafc',
                        textDark: '#1e293b',
                        textGray: '#64748b',
                        textLight: '#94a3b8',
                        borderGray: '#f1f5f9',
                    },
                    boxShadow: {
                        'card': '0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03)',
                    }
                },
            },
        };
    </script>
    <style>
        .sidebar-collapsed .sidebar-text {
            display: none !important;
        }

        /* Custom scrollbar for webkit */
        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>

<body class="bg-bgMain text-textDark font-sans h-screen flex overflow-hidden">

    <!-- Sidebar -->
    <aside id="sidebar"
        class="w-[260px] bg-white border-r border-borderGray flex flex-col h-full shrink-0 z-20 shadow-[4px_0_24px_rgba(0,0,0,0.02)] transition-all duration-300">

        <!-- Logo -->
        <div id="logo-container" class="h-20 flex items-center px-6 justify-between transition-all duration-300">
            <div class="flex items-center gap-2 sidebar-text transition-opacity duration-300">
                <img src="/images/logo_evngenco2.png" alt="Logo" class="w-24 h-24 object-contain">
            </div>
            <button id="menu-toggle" class="text-evnBlue hover:text-evnRed shrink-0">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Navigation Scrollable Area -->
        <div class="flex-1 overflow-y-auto px-4 py-2 space-y-6 overflow-x-hidden">

            <!-- Top Menu -->
            <ul class="space-y-1">
                <li>
                    <a href="/admin"
                        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-evnBlue hover:bg-gray-50 hover:text-evnBlue transition-colors font-medium text-sm">
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                            </path>
                        </svg>
                        <span class="sidebar-text whitespace-nowrap transition-opacity duration-300">Trang chủ</span>
                    </a>
                </li>
                <li>
                    <a href="/admin/employ"
                        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-evnBlue hover:bg-gray-50 hover:text-evnRed transition-colors font-medium text-sm">
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                        <span class="sidebar-text whitespace-nowrap transition-opacity duration-300">Tài khoản</span>
                    </a>
                </li>
                <!-- Applications -->
                <!-- Active Accordion -->
                <li class="bg-activeBg rounded-lg overflow-hidden">
                    <a href="#" id="doctor-toggle"
                        class="flex items-center justify-between px-3 py-2.5 text-activeText font-semibold text-evnRed text-sm">
                        <div class="flex items-center gap-3">
                            <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z">
                                </path>
                            </svg>
                            <span class="sidebar-text whitespace-nowrap transition-opacity duration-300">Sáng
                                kiến</span>
                        </div>
                        <svg id="doctor-chevron"
                            class="w-4 h-4 transform shrink-0 sidebar-text transition-opacity duration-300" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7">
                            </path>
                        </svg>
                    </a>
                    <ul id="doctor-submenu"
                        class="hidden border-l-2 border-gray-200 ml-5 pl-2 space-y-1 mt-1 sidebar-text transition-opacity duration-300">
                        <li><a href="/admin/idea" class="block px-3 py-1.5 text-sm text-evnBlue font-medium
                                hover:text-evnRed">Danh sách sáng kiến</a></li>
                        <!-- <li><a href="#"
                                class="block px-3 py-1.5 text-sm text-evnBlue font-medium hover:text-evnRed">Doctor
                                list</a></li> -->
                    </ul>
                </li>


                <!-- Others -->
                <div>
                    <h3
                        class="px-3 text-xs font-bold text-textLight uppercase tracking-wider mb-2 mt-4 sidebar-text transition-opacity duration-300">
                        Others</h3>
                    <ul class="space-y-1">

                        <li>
                            <a href="#"
                                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-evnBlue hover:bg-gray-50 hover:text-evnRed transition-colors font-medium text-sm">
                                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                                    </path>
                                </svg>
                                <span class="sidebar-text whitespace-nowrap transition-opacity duration-300">Mail</span>
                            </a>
                        </li>
                        <li>
                            <a href="#"
                                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-evnBlue hover:bg-gray-50 hover:text-evnRed transition-colors font-medium text-sm">
                                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z">
                                    </path>
                                </svg>
                                <span
                                    class="sidebar-text whitespace-nowrap transition-opacity duration-300">Widgets</span>
                            </a>
                        </li>
                        <li>
                            <a href="/logout"
                                class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-500 hover:bg-red-50 transition-colors font-semibold text-sm mt-4">
                                <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                                    </path>
                                </svg>
                                <span class="sidebar-text whitespace-nowrap transition-opacity duration-300">Log
                                    Out</span>
                            </a>
                        </li>
                    </ul>
                </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full relative overflow-y-auto">

        <!-- Header -->
        <header
            class="h-[72px] shrink-0 sticky top-0 z-10 bg-bgMain/90 backdrop-blur-md px-8 flex items-center justify-between border-b border-borderGray">

            <!-- Search -->
            <div class="relative w-full max-w-sm">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                    <svg class="w-5 h-5 text-evnRed" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                <input type="text"
                    class="block w-full pl-10 pr-4 py-2 border border-gray-200 rounded-full text-sm placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-primary/30 focus:border-primary shadow-sm bg-white"
                    placeholder="Tìm kiếm">
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-5">

                <!-- Theme Toggle Switch -->
                <div class="flex items-center gap-2">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z">
                        </path>
                    </svg>
                    <div class="w-10 h-5 bg-gray-200 rounded-full relative cursor-pointer">
                        <div class="w-4 h-4 bg-white rounded-full absolute top-0.5 left-0.5 shadow-sm"></div>
                    </div>
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z">
                        </path>
                    </svg>
                </div>

                <!-- Icons -->
                <button class="relative text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9">
                        </path>
                    </svg>
                    <span class="absolute top-0 right-0 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                </button>
                <button class="relative text-gray-400 hover:text-gray-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z">
                        </path>
                    </svg>
                </button>

                <!-- Divider -->
                <div class="h-6 w-px bg-gray-200 mx-2"></div>

                <!-- Profile -->
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-sm font-bold text-textDark"
                            th:text="${user != null ? user.fullName : 'Patricia Peters'}">Patricia Peters</p>
                        <div class="flex items-center justify-end gap-1.5 mt-0.5">
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                            <p class="text-xs font-medium text-textGray">Online</p>
                        </div>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-gray-200 border-2 border-white shadow-sm overflow-hidden">
                        <img src="https://i.pravatar.cc/150?u=a042581f4e29026024d" alt="Profile"
                            class="w-full h-full object-cover">
                    </div>
                    <button class="text-gray-400 hover:text-gray-600 ml-1 bg-gray-100 p-1.5 rounded-full">
                        <svg class="w-5 h-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z">
                            </path>
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content Area -->
        <div class="p-8 space-y-6">
            <div class="bg-white rounded-[20px] p-6 shadow-card border border-borderGray">
                <h2 class="text-2xl font-bold text-textDark mb-4">Danh sách sáng kiến</h2>
                <p class="text-textLight">Nội dung danh sách sáng kiến sẽ được hiển thị ở đây.</p>
            </div>
        </div>
    </main>


    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const logoContainer = document.getElementById('logo-container');
            const sidebarTexts = document.querySelectorAll('.sidebar-text');

            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('w-[260px]');
                sidebar.classList.toggle('w-[80px]');

                logoContainer.classList.toggle('px-6');
                logoContainer.classList.toggle('justify-between');
                logoContainer.classList.toggle('justify-center');
                sidebar.classList.toggle('sidebar-collapsed');
            });

            // Doctor Accordion Toggle
            const doctorToggle = document.getElementById('doctor-toggle');
            const doctorSubmenu = document.getElementById('doctor-submenu');
            const doctorChevron = document.getElementById('doctor-chevron');

            if (doctorToggle) {
                doctorToggle.addEventListener('click', (e) => {
                    e.preventDefault();
                    doctorSubmenu.classList.toggle('hidden');
                    doctorChevron.classList.toggle('rotate-180');
                });
            }
        });
    </script>
</body>

</html>
